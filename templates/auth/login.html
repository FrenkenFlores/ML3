<!DOCTYPE html>
{% extends "base.html" %}

{% block title %}Flask App - Login{% endblock %}

{% block content %}
    <section class="about" style="max-width: 400px; margin: 5rem auto;">
        <h1>Sign in to Flask App</h1>
        <p>Enter your credentials to access your account</p>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div style="margin-bottom: 1rem;">
                <label for="email" style="display: block; margin-bottom: 0.5rem; color: #24292e; font-weight: 600;">Email address</label>
                <input type="text" id="email" name="email" required
                       style="width: 100%; padding: 0.5rem; border: 1px solid #e1e4e8; border-radius: 6px; font-size: 14px; transition: border-color 0.2s ease;">
            </div>
            
            <div style="margin-bottom: 1rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; color: #24292e; font-weight: 600;">Password</label>
                <input type="password" id="password" name="password" required
                       style="width: 100%; padding: 0.5rem; border: 1px solid #e1e4e8; border-radius: 6px; font-size: 14px; transition: border-color 0.2s ease;">
            </div>
            
            <button type="submit" style="width: 100%; padding: 0.75rem; font-size: 14px; font-weight: 600; background: #0366d6; color: white; border: none; border-radius: 6px; cursor: pointer;">Sign in</button>
        </form>
        
        <p style="margin-top: 1.5rem; text-align: center; color: #586069; font-size: 14px;">
            New to Flask App? <a href="{{ url_for('auth.register') }}" style="color: #0366d6; text-decoration: none; font-weight: 500;">Create an account</a>
        </p>
    </section>
{% endblock %}
